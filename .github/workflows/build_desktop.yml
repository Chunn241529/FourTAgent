name: Build Flutter Desktop

on:
  push:
    tags:
      - "v*" # Trigger on version tags like v1.0.0
  workflow_dispatch: # Allow manual trigger

jobs:
  build-and-release:
    name: Build Windows & Create Release
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: "stable"

      - name: Setup MSVC and Windows SDK
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Verify Flutter Setup
        run: |
          flutter doctor -v
          flutter config --enable-windows-desktop

      - name: Get Flutter Dependencies
        working-directory: mobile_app
        run: |
          flutter clean
          flutter pub get

      - name: Build Windows Release
        working-directory: mobile_app
        run: flutter build windows --release -v

      - name: Build Windows Debug (for logs)
        working-directory: mobile_app
        run: flutter build windows --debug -v

      - name: Verify release artifacts
        shell: pwsh
        run: |
          $releasePath = 'mobile_app/build/windows/x64/runner/Release'
          Write-Host "Release path: $releasePath"
          if (-Not (Test-Path $releasePath)) {
            Write-Error "Release directory not found: $releasePath"
            Get-ChildItem -Recurse mobile_app/build/windows | Select-Object -First 20 | Format-List
            exit 1
          }

          Set-Location $releasePath
          Write-Host 'Check main files'
          if (-Not (Test-Path .\Lumina.exe)) { Write-Error 'Lumina.exe missing'; exit 1 } else { Write-Host 'Lumina.exe exists' }

          $icudtl = Get-ChildItem -Path mobile_app/build/windows -Filter icudtl.dat -Recurse -ErrorAction SilentlyContinue
          if (-Not $icudtl) {
            Write-Error 'icudtl.dat missing in any build/public path'
            Get-ChildItem -Path mobile_app/build/windows -Recurse -Filter icudtl.dat | Format-List -Property FullName
            exit 1
          } else {
            Write-Host "icudtl.dat found at: $($icudtl.FullName)"
          }

          if (-Not (Test-Path .\flutter_assets)) { Write-Error 'flutter_assets missing'; exit 1 } else { Write-Host 'flutter_assets exists' }
          Get-ChildItem -Filter '*.dll' | Where-Object Name -Match 'flutter_windows.dll' | ForEach-Object { Write-Host "Found $_" }

      - name: Upload release artifacts for diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: mobile_app/build/windows/x64/runner/Release/**/*

      - name: Create Windows Archive
        run: |
          cd mobile_app/build/windows/x64/runner/Release
          7z a -tzip Lumina-${{ github.ref_name }}-windows.zip *
          move Lumina-${{ github.ref_name }}-windows.zip ../../../../../..
          cd ../../../../../..
          dir Lumina-*.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: Lumina-${{ github.ref_name }}-windows.zip
          draft: false
          prerelease: false
          generate_release_notes: true
