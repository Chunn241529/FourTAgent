name: Build Flutter Desktop

on:
  push:
    tags:
      - "v*" # Trigger on version tags like v1.0.0
  workflow_dispatch: # Allow manual trigger

jobs:
  build-and-release:
    name: Build Windows & Create Release
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: "stable"

      - name: Setup MSVC and Windows SDK
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Verify Flutter Setup
        run: |
          flutter doctor -v
          flutter config --enable-windows-desktop

      - name: Get Flutter Dependencies
        working-directory: mobile_app
        run: |
          flutter clean
          flutter pub get

      - name: Build Windows Release
        working-directory: mobile_app
        run: flutter build windows --release -v

      - name: Build Windows Debug (for logs)
        working-directory: mobile_app
        run: flutter build windows --debug -v

      - name: Verify release artifacts
        run: |
          cd mobile_app/build/windows/x64/runner/Release
          echo "Check main files"
          if exist Lumina.exe (echo "Lumina.exe exists") else (echo "Lumina.exe missing" & exit 1)
          if exist icudtl.dat (echo "icudtl.dat exists") else (echo "icudtl.dat missing" & exit 1)
          if exist flutter_assets\ (echo "flutter_assets exists") else (echo "flutter_assets missing" & exit 1)
          dir *.dll | findstr /i "flutter_windows.dll"

      - name: Upload release artifacts for diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: mobile_app/build/windows/x64/runner/Release/**/*

      - name: Create Windows Archive
        run: |
          cd mobile_app/build/windows/x64/runner/Release
          7z a -tzip Lumina-${{ github.ref_name }}-windows.zip *
          move Lumina-${{ github.ref_name }}-windows.zip ../../../../../..
          cd ../../../../../..
          dir Lumina-*.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: Lumina-${{ github.ref_name }}-windows.zip
          draft: false
          prerelease: false
          generate_release_notes: true
